server:
  port: "${PORT:8080}"

openapi:
  id: "${API_ID:hello-watson}"
  title: "${API_TITLE:Hello Watson}"
  description: "${API_DESCRIPTION:Simple Hello World API}"

cache:
  stock-items:
    ttl-seconds: "${CACHE_TTL_SECONDS:60}"
    max-size: "${CACHE_MAX_SIZE:500}"

throttling:
  requests-per-minute: "${THROTTLING_RPM:20}"

stock:
  low-threshold: "${STOCK_LOW_THRESHOLD:20}"

spring:
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.ibm.inventory_management.models"
